<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিরেক্টরি - IlmPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, sans-serif; }
        .listing-card { transition: 0.3s; }
        .listing-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .badge { font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-book-open"></i> IlmPulse</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">হোম</a></li>
            <li class="nav-item"><a class="nav-link active" href="directory.html">ডিরেক্টরি</a></li>
        </ul>
    </div>
</nav>

<div class="container my-5">
    <h1 class="mb-4">ইসলামী উদ্যোগসমূহ</h1>
    
    <!-- সার্চ বক্স -->
    <div class="input-group mb-4">
        <input type="text" id="searchInput" class="form-control form-control-lg" 
               placeholder="উদ্যোগের নাম, ক্যাটাগরি বা এলাকা দিয়ে খুঁজুন...">
        <button class="btn btn-success" onclick="searchListings()">
            <i class="fas fa-search"></i>
        </button>
    </div>

    <div class="row" id="listingsContainer">
        <!-- জাভাস্ক্রিপ্ট দিয়ে লোড হবে -->
    </div>
</div>

<script>
// আপনার Sheet থেকে নেওয়া ২০টা লিস্টিং
const listings = [
    {
        title: "As Sunnah Foundation",
        category: "চ্যারিটি ও যাকাত",
        description: "দাওয়াহ, শিক্ষা ও সেবামূলক কাজ",
        link: "https://assunnahfoundation.org/",
        location: "ঢাকা"
    },
    {
        title: "আইফতোয়া",
        category: "ফতোয়া ওয়েবসাইট",
        description: "বাংলা ফতোয়া ওয়েবসাইট",
        link: "https://ifatwa.info/",
        location: "অনলাইন"
    },
    {
        title: "মিফতাহুল উলূম অনলাইন একাডেমী",
        category: "অনলাইন মাদ্রাসা",
        description: "অনলাইন মাদ্রাসা ও শিক্ষা",
        link: "https://www.miftahul-uloom.com/",
        location: "অনলাইন"
    },
    {
        title: "As-Sunnah Trust",
        category: "চ্যারিটি",
        description: "যাকাত ও সেবামূলক কাজ",
        link: "https://assunnahtrust.org/",
        location: "ঢাকা"
    },
    {
        title: "আল কুরআনের ভাষা",
        category: "আরবি শিক্ষা",
        description: "আরবি শিক্ষার ওয়েবসাইট",
        link: "https://www.alquranervasha.com/",
        location: "অনলাইন"
    },
    {
        title: "ইসলামিক অনলাইন মাদরাসা (IOM)",
        category: "অনলাইন মাদ্রাসা",
        description: "অনলাইন মাদ্রাসা",
        link: "https://iom.edu.bd/",
        location: "অনলাইন"
    },
    {
        title: "Hudhudprokashon",
        category: "প্রকাশনা",
        description: "ইসলামিক বই প্রকাশনা",
        link: "https://hudhudprokashon.com/",
        location: "ঢাকা"
    },
    {
        title: "Maktabatul Azhar",
        category: "বই বিক্রয়",
        description: "ইসলামী বইয়ের দোকান",
        link: "https://maktabatulazhar.com/",
        location: "অনলাইন"
    },
    {
        title: "Wafilife.com",
        category: "অনলাইন শপ",
        description: "ইসলামিক বুকশপ",
        link: "https://www.wafilife.com/",
        location: "অনলাইন"
    },
    {
        title: "Nurul Quran Academy",
        category: "অনলাইন মাদ্রাসা",
        description: "কুরআন শিক্ষা",
        link: "https://nlquran.net/",
        location: "অনলাইন"
    }
    // আরও যোগ করতে চাইলে বলুন
];

function renderListings(filteredListings) {
    const container = document.getElementById('listingsContainer');
    container.innerHTML = '';
    
    filteredListings.forEach(item => {
        const card = `
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card listing-card h-100">
                    <div class="card-body">
                        <span class="badge bg-success mb-2">${item.category}</span>
                        <h5 class="card-title">${item.title}</h5>
                        <p class="card-text">${item.description}</p>
                        ${item.location ? `<p class="text-muted small"><i class="fas fa-map-marker-alt"></i> ${item.location}</p>` : ''}
                        ${item.link ? `<a href="${item.link}" target="_blank" class="btn btn-sm btn-outline-success">ওয়েবসাইট দেখুন</a>` : ''}
                    </div>
                </div>
            </div>
        `;
        container.innerHTML += card;
    });
}

function searchListings() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = listings.filter(item => 
        item.title.toLowerCase().includes(query) ||
        item.category.toLowerCase().includes(query) ||
        (item.description && item.description.toLowerCase().includes(query))
    );
    renderListings(filtered.length ? filtered : listings);
}

// প্রথমবার লোড
renderListings(listings);
</script>

</body>
</html>
