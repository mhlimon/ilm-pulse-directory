];

function renderListings(filtered) {
    const container = document.getElementById('listingsContainer');
    container.innerHTML = '';
    filtered.forEach(item => {
        const html = `
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card listing-card h-100">
                    <div class="card-body">
                        <span class="badge bg-success mb-2">${item.category}</span>
                        <h5>${item.title}</h5>
                        <p class="text-muted">${item.description}</p>
                        ${item.location ? `<small class="text-muted"><i class="fas fa-map-marker-alt"></i> ${item.location}</small><br>` : ''}
                        <a href="${item.link}" target="_blank" class="btn btn-sm btn-outline-success mt-2">বিস্তারিত দেখুন →</a>
                    </div>
                </div>
            </div>`;
        container.innerHTML += html;
    });
}

function filterListings() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('categoryFilter').value;
    
    let filtered = listings;
    if (search) {
        filtered = filtered.filter(item => 
            (item.title && item.title.toLowerCase().includes(search)) || 
            (item.description && item.description.toLowerCase().includes(search))
        );
    }
    if (cat) {
        filtered = filtered.filter(item => item.category.includes(cat));
    }
    renderListings(filtered);
}

document.getElementById('searchInput').addEventListener('keyup', filterListings);
document.getElementById('categoryFilter').addEventListener('change', filterListings);

renderListings(listings);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
